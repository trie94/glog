<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>glog // graphics blog</title>
    
    <!-- Typefaces -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- KaTeX CSS for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
  </head>
  <body>
    <div id="app" class="app-container">
      <!-- Sidebar Navigation -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <a href="#" class="logo-link">
            <span class="logo-text">glog</span>
            <span class="logo-dot">.</span>
          </a>
          <span class="logo-subtitle">graphics brain dump</span>
        </div>
        
        <nav class="sidebar-nav">
          <div class="nav-section-title">Navigation</div>
          <ul class="nav-links">
            <li>
              <a href="#" id="nav-home" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Overview</span>
              </a>
            </li>
          </ul>

          <div class="nav-section-title">Articles</div>
          <ul id="posts-list" class="posts-list">
            <!-- Dynamic Post Links will be loaded here -->
            <li class="loading-placeholder">Loading posts...</li>
          </ul>
        </nav>
      </aside>

      <!-- Main Layout Content -->
      <div class="main-layout">
        <header class="app-header">
          <div class="mobile-menu-toggle" id="menu-toggle" aria-label="Toggle Sidebar">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </div>
          
          <div class="header-search">
            <!-- Optional search bar placeholder -->
            <!-- TODO: implement this-->
          </div>

          <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Dark/Light Mode">
            <!-- Moon Icon -->
            <svg class="theme-icon icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <!-- Sun Icon -->
            <svg class="theme-icon icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          </button>
        </header>

        <main id="content" class="content-container">
          <!-- Main Content dynamically injected here -->
        </main>
      </div>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
